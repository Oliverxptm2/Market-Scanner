<!DOCTYPE html>
<html lang="en">
<head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap');
  :root{--bg:#060606;--bg2:#0e0e0e;--bg3:rgba(255,255,255,.025);--border:rgba(255,255,255,.07);--purple:#9333ea;--purple-light:#c084fc;--purple-dim:rgba(139,92,246,.12);--purple-border:rgba(139,92,246,.3);--green:#4ade80;--red:#f87171;--yellow:#facc15;--text:#e8e8e8;--text-dim:#555;--text-mid:#888}

  html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
  ::-webkit-scrollbar{width:0}
  #app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}

  .ms-sizes{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:12px}
  .ms-size-chip{min-width:64px;padding:8px 6px;border-radius:10px;text-align:center;flex-shrink:0;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06)}

  .ms-err-s{color:#3a3a3a;font-size:12px;margin-bottom:20px;line-height:1.6}
  .ms-tg-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}

  .ms-tg-ic{font-size:16px;margin-bottom:4px}
  .ms-tg-lb{font-size:11px;font-weight:600;color:#444}

  .ms-sw{margin-top:7px;width:22px;height:12px;border-radius:100px;position:relative;background:rgba(255,255,255,.07);transition:background .2s}

  .ms-notes{width:100%;height:65px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;color:#d0d0d0;font-size:12px;line-height:1.6;margin-bottom:14px;font-family:'Syne',sans-serif;resize:none;outline:none}

<body>
<div id="app">
  <div class="ms-nav">
    <div class="ms-top">
      <div class="ms-wordmark">
        <div class="ms-logo">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div>
          <div class="ms-name">MARKET<span>SCANNER</span></div>
          <div class="ms-sub">Resale Intelligence</div>
        </div>
      </div>
      <div class="ms-live"><div class="ms-dot"></div><span class="ms-live-txt">Live</span></div>
    </div>
    <div class="ms-tabs">
      <button class="ms-tab on" onclick="msTab('price',this)"><div class="ms-tab-ic">◈</div><div class="ms-tab-lb">Price Check</div></button>
      <button class="ms-tab" onclick="msTab('resell',this)"><div class="ms-tab-ic">◎</div><div class="ms-tab-lb">Reseller</div></button>

    </div>
  </div>

  <div id="ms-resell" class="ms-panel"></div>
  <div id="ms-market" class="ms-panel"></div>
</div>

<script>
const S={price:{ph:'idle',img:null,data:null},resell:{ph:'idle',img:null,data:null,ex:{b:false,t:false,r:false,e:false,n:''}},market:{ph:'idle',img:null,data:null},chart:null,apiKey:localStorage.getItem('ms_key')||''};

function msTab(id,btn){
  document.querySelectorAll('.ms-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.ms-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('ms-'+id).classList.add('on');
}

function renderKeySetup(){
  return`<div style="padding:40px 16px 0;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px">
    <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#5b21b6,#9333ea);display:flex;align-items:center;justify-content:center;font-size:22px">&#128273;</div>
    <div style="font-size:20px;font-weight:800;background:linear-gradient(130deg,#e8e8e8 45%,#9333ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">API Key Required</div>
    <p style="color:#3a3a3a;font-size:13px;line-height:1.7">Market Scanner calls the Claude API directly from your browser. You need a free Anthropic API key to use the downloaded version.</p>
    <input id="ms-key-inp" type="password" placeholder="sk-ant-api03-..." value="${S.apiKey}" style="width:100%;padding:13px 14px;border-radius:10px;border:1px solid rgba(139,92,246,.35);background:rgba(139,92,246,.06);color:#e0e0e0;font-size:13px;font-family:'Fira Code',monospace;outline:none"/>
    <button onclick="saveKey()" class="ms-btn" style="max-width:220px">Save &amp; Continue &#8594;</button>
    <p style="font-size:11px;color:#2a2a2a;line-height:1.8">Get a free key at <span style="color:#9333ea">console.anthropic.com</span><br/>Your key is saved locally &mdash; never sent anywhere else.</p>
  </div>`;
}

function saveKey(){
  const v=document.getElementById('ms-key-inp')?.value?.trim();
  if(!v)return;
  S.apiKey=v;
  localStorage.setItem('ms_key',v);
  renderPrice();renderResell();renderMarket();
}

async function msCall(b64,sys,usr){
  if(!S.apiKey){throw new Error('NO_KEY');}
  const content=b64?[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:usr}]:[{type:'text',text:usr}];
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content}]})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'HTTP '+r.status);}
  const d=await r.json();
  const txt=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  const m=txt.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
  if(!m)throw new Error('No JSON');
  try{return JSON.parse(m[0])}catch{return JSON.parse(m[0].replace(/,\s*[}\]]/g,s=>s.slice(1)))}
}

const SYS_P=`Expert sneaker/streetwear/collectibles resale analyst. ALWAYS use web_search to find real current prices on StockX, GOAT, Klekt, eBay before answering. Return ONLY valid minified JSON, no markdown, no backticks, no explanation. Never fabricate prices.`;
const SYS_R=`Expert reseller consultant. ALWAYS use web_search for current market prices. Critically assess condition from image. Return ONLY valid minified JSON. No markdown. No backticks.`;
const SYS_M=`Financial analyst for sneaker/streetwear resale market. ALWAYS use web_search to find real price history data. Search: "[item] price history StockX", "[item] resale trend 2024 2025". priceHistory must have 12-15 entries with realistic numeric price values. Return ONLY valid minified JSON. No markdown. No backticks.`;

const PR_P=`Identify item, search web for live prices now. Return JSON:

function mkUpload(id,cb){
  let inp=document.getElementById(id);
  if(!inp){inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.id=id;inp.style.display='none';document.body.appendChild(inp);}
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>cb(ev.target.result);rd.readAsDataURL(f);inp.value='';};
  return inp;
}

function destroyChart(){if(S.chart){S.chart.destroy();S.chart=null;}}

function buildChart(canvasId,history){
  destroyChart();
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const prices=history.map(h=>typeof h.price==='number'?h.price:parseFloat(String(h.price).replace(/[^0-9.]/g,''))||0);
  const validPrices=prices.filter(p=>p>0);
  if(!validPrices.length)return;
  const minP=Math.min(...validPrices),maxP=Math.max(...validPrices);
  const isUp=prices[prices.length-1]>=prices[0];
  const ctx=canvas.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,180);
  grad.addColorStop(0,isUp?'rgba(147,51,234,.35)':'rgba(239,68,68,.35)');
  grad.addColorStop(1,'rgba(6,6,6,0)');
  S.chart=new Chart(canvas,{
    type:'line',
    data:{labels:history.map(h=>h.label),datasets:[{data:prices,borderColor:isUp?'#9333ea':'#f87171',borderWidth:2,backgroundColor:grad,fill:true,tension:0.4,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:isUp?'#c084fc':'#fca5a5',pointHoverBorderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#0d0d0d',borderColor:'rgba(139,92,246,.3)',borderWidth:1,titleColor:'#555',bodyColor:'#c084fc',titleFont:{family:'Fira Code',size:10},bodyFont:{family:'Fira Code',size:12,weight:'600'},padding:9,callbacks:{title:items=>items[0].label,label:item=>`$${Math.round(item.raw).toLocaleString()}`}}},
      scales:{x:{grid:{display:false},border:{display:false},ticks:{color:'#333',font:{family:'Fira Code',size:8},maxTicksLimit:6,maxRotation:0}},y:{position:'right',grid:{color:'rgba(255,255,255,.04)'},border:{display:false},ticks:{color:'#333',font:{family:'Fira Code',size:8},callback:v=>`$${Math.round(v)}`,maxTicksLimit:5},min:Math.floor(minP*.96),max:Math.ceil(maxP*1.04)}}}
  });
}

  el.innerHTML=`${renderHero(m.img,()=>{destroyChart();S.market={ph:'idle',img:null,data:null};renderMarket();},d.dataFreshness)}${renderPH(d)}
  ${d.buySignal?`<div class="ms-sig fu2" style="background:${sigBg};border:1px solid ${sigBd}"><div><div class="ms-sig-l">Market Signal</div><div class="ms-sig-v" style="color:${sigC}">${d.buySignal}</div></div><div style="text-align:right"><div style="font-size:8px;color:#3a3a3a;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Appreciation</div><span class="ms-tag ${tagClass(appTc)}" style="font-size:10px">${d.totalAppreciation||'&mdash;'}</span></div></div>`:''}
  <div class="ms-g3 fu2"><div class="ms-sc big"><div class="ms-sc-l">Current</div><div class="ms-sc-v" style="color:#c084fc">${d.currentPrice||'&mdash;'}</div></div><div class="ms-sc"><div class="ms-sc-l">All-Time High</div><div class="ms-sc-v" style="color:#4ade80">${d.allTimeHigh||'&mdash;'}</div></div><div class="ms-sc"><div class="ms-sc-l">All-Time Low</div><div class="ms-sc-v" style="color:#f87171">${d.allTimeLow||'&mdash;'}</div></div></div>
  <div class="ms-g3 fu2"><div class="ms-sc"><div class="ms-sc-l">Retail</div><div class="ms-sc-v" style="color:#555">${d.retailPrice||'&mdash;'}</div></div><div class="ms-sc"><div class="ms-sc-l">Liquidity</div><div class="ms-sc-v" style="font-size:12px;color:${d.liquidity==='High'?'#4ade80':d.liquidity==='Low'?'#f87171':'#facc15'}">${d.liquidity||'&mdash;'}</div></div><div class="ms-sc"><div class="ms-sc-l">Volatility</div><div class="ms-sc-v" style="font-size:12px;color:${d.volatility==='High'?'#f87171':d.volatility==='Low'?'#4ade80':'#facc15'}">${d.volatility||'&mdash;'}</div></div></div>
  ${d.priceHistory?.length?`<div class="fu3"><div class="ms-sl">Price history</div><div class="ms-chart-wrap"><div class="ms-chart-canvas"><canvas id="ms-chart"></canvas></div><div class="ms-chart-legend"><div class="ms-leg-it"><div class="ms-leg-line" style="background:${isUp?'#9333ea':'#f87171'}"></div><span class="ms-leg-lb">Price</span></div><div class="ms-leg-it"><div class="ms-leg-line" style="background:rgba(139,92,246,.3);height:1px"></div><span class="ms-leg-lb">Average</span></div></div></div></div>`:''}
  ${d.keyEvents?.length?`<div class="fu3"><div class="ms-sl">Key market events</div>${d.keyEvents.map(e=>`<div class="ms-event"><div class="ms-event-dot" style="background:${e.impact==='positive'?'#4ade80':e.impact==='negative'?'#f87171':'#facc15'}"></div><div><div class="ms-event-d">${e.date}</div><div class="ms-event-t">${e.event}</div></div></div>`).join('')}</div>`:''}
  ${d.analystNote?`<div class="ms-analyst fu4"><div class="ms-analyst-l">Analyst Note</div><div class="ms-analyst-t">${d.analystNote}</div></div>`:''}
  <div class="fu4" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">${[d.topBuyers&&{l:'Top Buyers',v:d.topBuyers},d.peakSeason&&{l:'Peak Season',v:d.peakSeason}].filter(Boolean).map(r=>`<div style="padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)"><div style="font-size:8px;color:#3a3a3a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:700">${r.l}</div><div style="font-size:10px;color:#555">${r.v}</div></div>`).join('')}</div>
  ${d.dataNotes?`<div class="ms-note-box fu4">&#9432; ${d.dataNotes}</div>`:''}
  <button class="ms-btn fu4" onclick="destroyChart();S.market={ph:'idle',img:null,data:null};renderMarket()">Analyse New Item</button>`;

  if(d.priceHistory?.length){
    requestAnimationFrame(()=>setTimeout(()=>buildChart('ms-chart',d.priceHistory),50));
  }
}

renderPrice();renderResell();renderMarket();
</script>
</body>
</html>
